<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Advisor Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section" style="position: relative;">
            <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.remove('show')" style="position: absolute; right: -5px; top: -5px; color: white;"><i class="fa-solid fa-bars"></i></button>
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" class="logo-placeholder">
        </div>
        
        <div class="sidebar-brand"></div>

        <nav>
            <a href="Advisor Panel.html" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Student Requests</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Manage Schedule <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
            <a href="#" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Academic Reports <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
            <a href="advisor-chat.html" class="nav-link active"><i class="fa-solid fa-comment-dots"></i> Messages</a>
            <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            <div style="position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 0; width: 100%; text-align: center;">
                <a href="#" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;"><i class="fa-solid fa-globe"></i> English / عربي</a>
            </div>
        </nav>
    </aside>

    <div class="chat-container">
        <div class="contacts show">
            <div style="padding: 25px; font-weight: 800; font-size: 1.4rem; color: var(--taibah-blue); display: flex; justify-content: space-between; align-items: center;">
                <span>Student Chats</span>
                <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.remove('show')"><i class="fa-solid fa-bars"></i></button>
            </div>
            
            <div class="contact-item" id="contact-mohammed" onclick="switchChat('mohammed')">
                <div style="width: 50px; height: 50px; background: #e2e8f0; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-user-graduate" style="color: #64748b;"></i></div>
                <div class="contact-info">
                    <strong>Mohammed</strong>
                    <p style="margin:5px 0 0; font-size: 0.85rem; color: #64748b;"></p>
                </div>
            </div>
            
            <div class="contact-item " id="contact-abdulaziz" onclick="switchChat('abdulaziz')">
                <div style="width: 50px; height: 50px; background: #e2e8f0; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-user-graduate" style="color: var(--taibah-blue);"></i></div>
                <div class="contact-info">
                    <strong style="color: var(--taibah-blue);">Abdulaziz</strong>
                    <p style="margin:5px 0 0; font-size: 0.85rem; color: #64748b;"></p>
                </div>
            </div>
        </div>
        
        <div class="window" id="empty-chat-state" style="display: flex; flex-direction: column; background: #f8fafc;">
            <div style="padding: 20px 25px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 15px;">
                <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.toggle('show')"><i class="fa-solid fa-address-book"></i></button>
            </div>
            <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center; flex-direction: column;">
                <i class="fa-solid fa-comments" style="font-size: 4rem; color: #cbd5e1; margin-bottom: 20px;"></i>
                <h2 style="color: #64748b; margin: 0; text-align: center;">Select a chat to start messaging</h2>
                <p style="color: #94a3b8; font-size: 0.9rem; text-align: center;">Choose a student from the contacts list.</p>
            </div>
        </div>

        <div class="window" id="chat-mohammed" style="display: none;">
            <div style="padding: 20px 25px; border-bottom: 1px solid #f1f5f9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                    <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.toggle('show')"><i class="fa-solid fa-address-book"></i></button>
                    <span>Mohammed | ID: 44000XXX</span>
                </div>
                <span style="font-size: 0.85rem; color: #2ecc71;"><i class="fa-solid fa-circle" style="font-size: 0.6rem; margin-right: 5px;"></i>Online</span>
            </div>
            
            <div class="chat-area" id="chat-area-mohammed"></div>
            
            <div class="input-bar">
                <input type="text" placeholder="Type your reply to Mohammed...">
                <button class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        
        <div class="window" id="chat-abdulaziz" style="display: none;">
            <div style="padding: 20px 25px; border-bottom: 1px solid #f1f5f9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                    <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.toggle('show')"><i class="fa-solid fa-address-book"></i></button>
                    <span>Abdulaziz | ID: 44001XXX</span>
                </div>
                <span style="font-size: 0.85rem; color: #f39c12;"><i class="fa-solid fa-circle" style="font-size: 0.6rem; margin-right: 5px;"></i>Away</span>
            </div>
            
            <div class="chat-area" id="chat-area-abdulaziz"></div>
            
            <div class="input-bar">
                <input type="text" placeholder="Type your reply to Abdulaziz...">
                <button class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
