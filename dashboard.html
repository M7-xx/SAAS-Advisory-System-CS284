<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Student Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --taibah-blue: #1B3A5C;
        --taibah-gold: #C5A059; /* Traditional accent color */
        --bg-gray: #f4f7f9;
        --text-dark: #2d3748;
        --glass: rgba(255, 255, 255, 0.9);
        --success-green: #2ecc71; /* New color for high GPA */
    }

    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        margin: 0;
        background-color: var(--bg-gray);
        display: flex;
        color: var(--text-dark);
    }

    /* Sidebar Styling */
    .sidebar {
        width: 260px;
        height: 100vh;
        background: linear-gradient(180deg, var(--taibah-blue) 0%, #0d1b2a 100%);
        color: white;
        position: fixed;
        padding: 25px 15px;
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        box-sizing: border-box; /* THIS FIXES THE JUMPING */
    }

    /* Logo Placeholder Section */
    .logo-section {
        text-align: center;
        padding: 20px 0;
        margin-bottom: 10px;
    }

    .logo-placeholder {
        width: 240px; /* Big enough for visibility */
        height: auto;
        margin-bottom: 15px;
        filter: brightness(0) invert(1); 
    }

    .sidebar-brand {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 40px;
        text-align: center;
        color: var(--taibah-gold);
        letter-spacing: 1px;
    }

    /* Standardized to match Chat and Booking perfectly */
    .nav-link {
        padding: 12px 15px;
        display: flex;
        align-items: center;
        color: #e2e8f0;
        text-decoration: none;
        border-radius: 12px;
        margin-bottom: 8px;
        gap: 15px; 
        transition: 0.3s;
    }

    .nav-link i { width: 20px; text-align: center; }

    .nav-link:hover, .nav-link.active {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        transform: translateX(5px);
    }

    /* Main Content */
    .main-content {
        margin-left: 280px;
        padding: 40px;
        width: calc(100% - 280px);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
    }

    /* Modern Cards */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
    }

    .card {
        background: var(--glass);
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        border: 1px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(10px);
    }

    .card-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
        color: var(--taibah-blue);
    }

    .card-header i { margin-right: 10px; font-size: 1.2rem; }

    /* Progress Bar */
    .progress-container {
        background: #edf2f7;
        border-radius: 10px;
        height: 10px;
        margin: 15px 0;
    }

    .progress-fill {
        background: var(--success-green); /* Green for high standing */
        height: 100%;
        border-radius: 10px;
        width: 89%; 
    }

    .btn {
        background: var(--taibah-blue);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
        width: 100%;
    }

    .btn:hover { background: #2a4d7a; }

    .status-badge {
        background: #def7ec;
        color: #03543f;
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 0.8rem;
        font-weight: bold;
    }
</style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section">
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" alt="Taibah University Logo" class="logo-placeholder">
        </div>
        
        <div class="sidebar-brand"></div>
        
        <nav>

    <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-book"></i> Academic Plan</a>
    <a href="booking.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="chat.html" class="nav-link"><i class="fa-solid fa-comment-dots"></i> Messages</a>
    <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Welcome, Mohammed</h1>
            <div style="font-weight: bold; color: var(--taibah-blue);">
                <i class="fa-solid fa-globe"></i> English / عربي
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-header"><i class="fa-solid fa-graduation-cap"></i> <h3>Academic Progress</h3></div>
                <p>GPA: <strong>4.45 / 5.0</strong></p>
                <div class="progress-container"><div class="progress-fill"></div></div>
                <p style="font-size: 0.9rem; color: #718096;">82 Credits Completed of 134</p>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-solid fa-clock"></i> <h3>Upcoming Session</h3></div>
                <p><strong>Advisor:</strong> Dr. Abdulmajeed Aljuhani</p>
                <p><strong>Date:</strong> Monday, April 20</p>
                <p><span class="status-badge">Confirmed</span></p>
                <button class="btn" style="background: transparent; border: 1px solid var(--taibah-blue); color: var(--taibah-blue);">Reschedule</button>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-solid fa-plus-circle"></i> <h3>Course Actions</h3></div>
                <p>Registration window is currently <strong>Open</strong>.</p>
                <button class="btn">Submit Add/Drop Request</button>
            </div>
        </div>
    </main>

</body>
</html>
