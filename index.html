<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAAS | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --taibah-blue: #1B3A5C; --taibah-gold: #C5A059; --glass: rgba(255, 255, 255, 0.95); }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--taibah-blue) 0%, #0d1b2a 100%);
        }
        .login-card {
            background: var(--glass); padding: 50px 40px; border-radius: 24px;
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .logo { width: 220px; margin-bottom: 30px; }
        input {
            width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #e2e8f0;
            border-radius: 12px; box-sizing: border-box; background: #f8fafc;
        }
        
        /* Updated Button Styles for Roles */
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; border: none;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-student { background: var(--taibah-blue); color: white; }
        .btn-student:hover { background: #2a4d7a; transform: translateY(-2px); }
        
        .btn-advisor { background: var(--taibah-gold); color: white; margin-top: 15px; }
        .btn-advisor:hover { background: #b08d4a; transform: translateY(-2px); }

        .links { margin-top: 25px; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .links a { color: var(--taibah-blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" alt="Taibah Logo" class="logo">
        <h2 style="color: var(--taibah-blue); margin-bottom: 30px;">Academic Advisory</h2>
        
        <input type="text" placeholder="University Email (@taibahu.edu.sa)">
        <input type="password" placeholder="Password">
        
        <a href="dashboard.html" style="text-decoration: none; display: block;">
            <button class="btn btn-student" type="button"><i class="fa-solid fa-user-graduate"></i> Login as Student</button>
        </a>

        <a href="Advisor Panel.html" style="text-decoration: none; display: block;">
            <button class="btn btn-advisor" type="button"><i class="fa-solid fa-user-tie"></i> Login as Advisor</button>
        </a>
        
        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#" style="color: #718096;">العربية</a>
        </div>
    </div>
</body>
</html>
