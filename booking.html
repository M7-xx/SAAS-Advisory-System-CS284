<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Book Appointment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --taibah-blue: #1B3A5C; --taibah-gold: #C5A059; --bg-gray: #f4f7f9; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-gray); display: flex; cursor: default; caret-color: transparent; }
        
        /* Force arrow cursor and hide blinking carets on all text, while keeping inputs working */
        h1, h2, h3, p, span, strong, div, td, th { cursor: default; caret-color: transparent; }
        input, textarea { cursor: text; caret-color: auto; }
        a, button { cursor: pointer; caret-color: transparent; }

        /* Fixed Sidebar - Same as Dashboard */
        .sidebar { width: 260px; height: 100dvh; background: linear-gradient(180deg, var(--taibah-blue) 0%, #0d1b2a 100%); color: white; position: fixed; padding: 25px 15px; box-sizing: border-box; }
        .logo-section { text-align: center; margin-bottom: 10px; }
        .logo-placeholder { width: 180px; filter: brightness(0) invert(1); }
        
        /* Added the gold brand CSS here */
        .sidebar-brand { font-size: 1.2rem; font-weight: bold; margin-bottom: 40px; text-align: center; color: var(--taibah-gold); letter-spacing: 1px; }

        .nav-link { padding: 12px 15px; display: flex; align-items: center; color: #e2e8f0; text-decoration: none; border-radius: 12px; margin-bottom: 8px; gap: 15px; transition: 0.3s; }
        .nav-link i { width: 20px; text-align: center; }
        .nav-link.active { background: rgba(255, 255, 255, 0.15); color: white; transform: translateX(5px); }
        @media (hover: hover) {
            .nav-link:hover { background: rgba(255, 255, 255, 0.15); color: white; transform: translateX(5px); }
        }

        /* Main Content */
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .header { display: flex; justify-content: space-between; margin-bottom: 40px; user-select: none; -webkit-user-select: none; }
        .header h1, .header div { user-select: text; -webkit-user-select: text; }
        .card { background: var(--glass); padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); user-select: none; -webkit-user-select: none; }
        .card h3, .day-column strong { user-select: text; -webkit-user-select: text; }
        
        /* Grid Layout */
        .time-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 25px; }
        .day-column { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #edf2f7; text-align: center; }
        .slot { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .available { background: white; color: var(--taibah-blue); border: 1px solid #e2e8f0; }
        .available:hover { background: var(--taibah-blue); color: white; }
        .available.selected { background: var(--taibah-blue); color: white; border-color: var(--taibah-blue); transform: scale(1.05); box-shadow: 0 4px 10px rgba(27,58,92,0.3); }
        .booked { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        .btn-confirm { background: var(--taibah-blue); color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 25px; cursor: pointer; }

        .subject-input {
            width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; border: 1px solid #ddd;
            box-sizing: border-box; resize: vertical; min-height: 80px; max-height: 250px; font-size: 16px;
        }

        .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; color: var(--taibah-blue); cursor: pointer; padding: 0; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100dvh; z-index: 2000; transition: left 0.3s ease; }
            .sidebar.show { left: 0; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; box-sizing: border-box; }
            .header { 
                flex-direction: row; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 25px;
                position: sticky; top: 0; background: rgba(244, 247, 249, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100;
                padding: 15px 20px; margin: -20px -20px 25px -20px; border-bottom: 1px solid #e2e8f0;
            }
            .header h1 { font-size: 1.5rem; margin: 0; }
            .time-grid { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section" style="position: relative;">
            <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.remove('show')" style="position: absolute; right: -5px; top: -5px; color: white;"><i class="fa-solid fa-bars"></i></button>
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" class="logo-placeholder">
        </div>
        
        <div class="sidebar-brand"></div>

        <nav>
            
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-book"></i> Academic Plan <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
    <a href="booking.html" class="nav-link active"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="chat.html" class="nav-link"><i class="fa-solid fa-comment-dots"></i> Messages</a>
    <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    <div style="position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 0; width: 100%; text-align: center;">
        <a href="#" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;"><i class="fa-solid fa-globe"></i> English / عربي</a>
    </div>

        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                <h1>Schedule Session</h1>
            </div>
            <div style="font-weight: bold; color: var(--taibah-blue);">Dr. Abdulmajeed Aljuhani | <i class="fa-solid fa-user-tie"></i></div>
        </div>
        <div class="card">
            <h3>April 2026 Availability</h3>
            <div class="time-grid">
                <div class="day-column"><strong>Sunday</strong><button class="slot available">09:00</button><button class="slot booked">10:00</button></div>
                <div class="day-column"><strong>Monday</strong><button class="slot available">11:00</button><button class="slot available">13:00</button></div>
                <div class="day-column"><strong>Tuesday</strong><button class="slot booked">09:00</button><button class="slot available">14:00</button></div>
                <div class="day-column"><strong>Wednesday</strong><button class="slot available">10:00</button><button class="slot available">11:00</button></div>
                <div class="day-column"><strong>Thursday</strong><button class="slot available">09:00</button><button class="slot available">15:00</button></div>
            </div>
            <textarea class="subject-input" placeholder="Meeting Subject (e.g. CS284 Prerequisite help)"></textarea>
            <button class="btn-confirm">Request Confirmation</button>
        </div>
    </main>

    <script>
        // Close mobile menus when clicking outside
        document.addEventListener('click', (e) => {
            const sidebar = document.querySelector('.sidebar');
            
            if (sidebar && sidebar.classList.contains('show') && !e.target.closest('.sidebar') && !e.target.closest('.mobile-menu-btn')) {
                sidebar.classList.remove('show');
            }
        });

        // Handle dummy sidebar links (do nothing)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.getAttribute('href') === '#') {
                    e.preventDefault();
                    this.classList.add('active');
                    setTimeout(() => {
                        this.classList.remove('active');
                        this.blur();
                    }, 500);
                }
            });
        });

        // Handle time slot selection
        const slots = document.querySelectorAll('.slot.available');
        slots.forEach(slot => {
            slot.addEventListener('click', function() {
                slots.forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Handle booking confirmation
        document.querySelector('.btn-confirm').addEventListener('click', function() {
            const selectedSlot = document.querySelector('.slot.selected');
            const subject = document.querySelector('.subject-input').value.trim();
            
            if (!selectedSlot) {
                alert('Please select an available time slot first.');
                return;
            }
            if (subject === '') {
                alert('Please enter a meeting subject before confirming.');
                return;
            }
            
            const day = selectedSlot.closest('.day-column').querySelector('strong').textContent;
            alert(`✅ Appointment successfully requested for ${day} at ${selectedSlot.textContent}!\nSubject: ${subject}`);
            
            // Instantly update the UI to show the slot is now taken
            selectedSlot.classList.remove('selected', 'available');
            selectedSlot.classList.add('booked');
            document.querySelector('.subject-input').value = ''; // Clear input
        });
    </script>
</body>
</html>
