<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Advisor Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --taibah-blue: #1B3A5C;
            --taibah-gold: #C5A059;
            --bg-gray: #f4f7f9;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            display: flex;
        }

        /* High-Quality Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, var(--taibah-blue) 0%, #0d1b2a 100%);
            color: white;
            position: fixed;
            padding: 25px 15px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-placeholder { width: 180px; filter: brightness(0) invert(1); }

        .sidebar-brand {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: var(--taibah-gold);
            text-transform: uppercase;
        }

        .nav-link {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }

        /* Main Content */
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }

        .header { display: flex; justify-content: space-between; margin-bottom: 40px; }

        .card {
            background: var(--glass);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Table Styling */
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th { text-align: left; color: var(--taibah-blue); padding: 12px; border-bottom: 2px solid #edf2f7; }
        .table td { padding: 15px 12px; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; }

        /* Action Buttons */
        .btn-action { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .approve { background: #2ecc71; color: white; margin-right: 8px; }
        .reject { background: #e74c3c; color: white; }
        .approve:hover { background: #27ae60; }
        .reject:hover { background: #c0392b; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #ebf8ff; color: #3182ce; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section">
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" alt="Logo" class="logo-placeholder">
        </div>
        <div class="sidebar-brand"></div>
        <nav>
            <a href="#" class="nav-link active"><i class="fa-solid fa-user-graduate"></i> Student Requests</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Manage Schedule</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Academic Reports</a>
            <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Advisor Dashboard</h1>
            <div style="font-weight: bold; color: var(--taibah-blue);">
                Dr. Abdulmajeed Aljuhani | <i class="fa-solid fa-user-tie"></i>
            </div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-list-check" style="color: var(--taibah-blue);"></i> Pending Course Approvals</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Course Code</th>
                        <th>Request Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>44000XXX</td>
                        <td>Mohammed Alater</td>
                        <td><strong>CS284</strong></td>
                        <td><span class="badge">Add Course</span></td>
                        <td>
                            <button class="btn-action approve">Approve</button>
                            <button class="btn-action reject">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bell" style="color: var(--taibah-gold);"></i> System Notifications</h3>
            <p>You have <strong>3</strong> pending appointments for tomorrow.</p>
        </div>
    </main>

</body>
</html>
