<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Advisor Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section" style="position: relative;">
            <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.remove('show')" style="position: absolute; right: -5px; top: -5px; color: white;"><i class="fa-solid fa-bars"></i></button>
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" alt="Logo" class="logo-placeholder">
        </div>
        <div class="sidebar-brand"></div>
        <nav>
            <a href="Advisor Panel.html" class="nav-link active"><i class="fa-solid fa-user-graduate"></i> Student Requests</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Manage Schedule <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
            <a href="#" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Academic Reports <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
            
            <a href="advisor-chat.html" class="nav-link"><i class="fa-solid fa-comment-dots"></i> Messages</a>
            
            <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            <div style="position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 0; width: 100%; text-align: center;">
                <a href="#" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;"><i class="fa-solid fa-globe"></i> English / عربي</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                <h1>Advisor Dashboard</h1>
            </div>
            <div style="font-weight: bold; color: var(--taibah-blue);">
                Dr. Abdulmajeed Aljuhani | <i class="fa-solid fa-user-tie"></i>
            </div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-list-check" style="color: var(--taibah-blue);"></i> Pending Course Approvals</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Course Code</th>
                        <th>Request Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pending-requests-body">
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bell" style="color: var(--taibah-gold);"></i> System Notifications</h3>
            <p id="notification-text">You have <strong>0</strong> new appointment requests.</p>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
