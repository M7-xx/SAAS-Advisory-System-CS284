<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAS | Academic Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section" style="position: relative;">
            <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.remove('show')" style="position: absolute; right: -5px; top: -5px; color: white;"><i class="fa-solid fa-bars"></i></button>
            <img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" class="logo-placeholder">
        </div>
        
        <div class="sidebar-brand"></div>

        <nav>
            
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-book"></i> Academic Plan <span style="font-size: 0.6rem; background: var(--taibah-gold); color: white; padding: 2px 6px; border-radius: 10px; margin-left: auto;">SOON</span></a>
    <a href="booking.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="chat.html" class="nav-link active"><i class="fa-solid fa-comment-dots"></i> Messages</a>
    <a href="index.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    <div style="position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 0; width: 100%; text-align: center;">
        <a href="#" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;"><i class="fa-solid fa-globe"></i> English / عربي</a>
    </div>
        </nav>
    </aside>

    <div class="chat-container">
        <div class="contacts">
            <div style="padding: 25px; font-weight: 800; font-size: 1.4rem; color: var(--taibah-blue); display: flex; justify-content: space-between; align-items: center;">
                <span>Chats</span>
                <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.remove('show')"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div class="contact-item active">
                <div style="width: 50px; height: 50px; background: #e2e8f0; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-user-tie"></i></div>
                <div><strong>Dr. Abdulmajeed</strong><p style="margin:5px 0 0; font-size: 0.85rem; color: #64748b;">No, the digital appr...</p></div>
            </div>
        </div>
        <div class="window">
            <div style="padding: 20px 25px; border-bottom: 1px solid #f1f5f9; font-weight: bold; display: flex; align-items: center; gap: 15px;">
                <button class="mobile-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')"><i class="fa-solid fa-bars"></i></button>
                <button class="mobile-btn" onclick="document.querySelector('.contacts').classList.toggle('show')"><i class="fa-solid fa-address-book"></i></button>
                <span>Dr. Abdulmajeed Aljuhani</span>
            </div>
            <div class="chat-area" id="student-chat-area"></div>
            <div class="input-bar">
                <input type="text" placeholder="Write a message...">
                <button class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
