<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAAS | Academic Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --taibah-blue: #1B3A5C; --taibah-gold: #C5A059; --bg-gray: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-gray); display: flex; height: 100vh; }
        
        /* Unified Sidebar Quality */
        .sidebar { width: 260px; height: 100vh; background: linear-gradient(180deg, var(--taibah-blue) 0%, #0d1b2a 100%); color: white; position: fixed; padding: 25px 15px; box-sizing: border-box; }
        .logo-section { text-align: center; margin-bottom: 10px; }
        .logo-placeholder { width: 180px; filter: brightness(0) invert(1); }
        
        /* Added the gold brand CSS here */
        .sidebar-brand { font-size: 1.2rem; font-weight: bold; margin-bottom: 40px; text-align: center; color: var(--taibah-gold); letter-spacing: 1px; }

        .nav-link { padding: 12px 15px; display: flex; align-items: center; color: #e2e8f0; text-decoration: none; border-radius: 12px; margin-bottom: 8px; gap: 15px; transition: 0.3s; }
        .nav-link i { width: 20px; text-align: center; }
        .nav-link.active { background: rgba(255, 255, 255, 0.1); color: white; font-weight: 600; }

        /* Chat Container - Fixed margin to respect Sidebar */
        .chat-container { margin-left: 280px; margin-top: 25px; margin-right: 25px; margin-bottom: 25px; flex-grow: 1; display: flex; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e2e8f0; }
        
        .contacts { width: 320px; border-right: 1px solid #f1f5f9; background: #f8fafc; }
        .contact-item { padding: 25px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .contact-item.active { background: white; box-shadow: inset 4px 0 0 var(--taibah-blue); }
        .window { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-area { flex-grow: 1; padding: 40px; background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 65%; padding: 18px 22px; border-radius: 20px; margin-bottom: 15px; font-size: 0.95rem; }
        .advisor { background: #f1f5f9; color: #334155; border-bottom-left-radius: 4px; }
        .student { background: var(--taibah-blue); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .input-bar { padding: 25px 35px; border-top: 1px solid #f1f5f9; display: flex; gap: 15px; }
        input { flex-grow: 1; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; outline: none; }
        .send-btn { background: var(--taibah-blue); color: white; width: 55px; border-radius: 15px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section"><img src="https://www.taibahu.edu.sa/themes/custom/taiu_saud/logo.svg" class="logo-placeholder"></div>
        
        <div class="sidebar-brand"></div>

        <nav>
            
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-book"></i> Academic Plan</a>
    <a href="booking.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="chat.html" class="nav-link active"><i class="fa-solid fa-comment-dots"></i> Messages</a>
    <a href="login.html" class="nav-link" style="margin-top: 50px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>

    <div class="chat-container">
        <div class="contacts">
            <div style="padding: 25px; font-weight: 800; font-size: 1.4rem; color: var(--taibah-blue);">Chats</div>
            <div class="contact-item active">
                <div style="width: 50px; height: 50px; background: #e2e8f0; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-user-tie"></i></div>
                <div><strong>Dr. Abdulmajeed</strong><p style="margin:5px 0 0; font-size: 0.85rem; color: #64748b;">Course CS284 Approved...</p></div>
            </div>
        </div>
        <div class="window">
            <div style="padding: 25px 35px; border-bottom: 1px solid #f1f5f9; font-weight: bold;">Dr. Abdulmajeed Aljuhani</div>
            <div class="chat-area">
                <div class="bubble advisor">Hello Mohammed, I've approved your **CS284** request.</div>
                <div class="bubble student">Thank you Doctor! I'll check it right away.</div>
                <div class="bubble advisor">No, the digital approval in SAAS is enough.</div>
            </div>
            <div class="input-bar">
                <input type="text" placeholder="Write a message...">
                <button class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</body>
</html>
